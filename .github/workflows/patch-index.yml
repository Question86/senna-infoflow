name: Cleanup one-shot index patch workflow

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Remove this one-shot workflow
        run: |
          git config user.name "senna-infoflow[bot]"
          git config user.email "senna-infoflow[bot]@users.noreply.github.com"
          git rm .github/workflows/patch-index.yml
          git commit -m "chore: remove one-shot index patch workflow"
          git push
