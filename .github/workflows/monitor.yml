name: Senna Infoflow Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: senna-infoflow-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        timeout-minutes: 2
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run hardened monitor as visible main feed
        id: hardened
        timeout-minutes: 3
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USER_AGENT: senna-infoflow/1.0 (+https://github.com/${{ github.repository }})
          MAX_ITEMS_PER_SOURCE: 5
        run: |
          echo "Running normal hardened monitor as visible feed mainline."
          python scripts/run_monitor_hardened.py

      - name: Write emergency RSS fallback only if hardened fails
        if: steps.hardened.outcome != 'success'
        timeout-minutes: 3
        run: |
          echo "Hardened monitor failed or timed out. Writing emergency RSS fallback."
          python scripts/emergency_rss_writer.py

      - name: Restore full dashboard UI from protected commit
        run: |
          git checkout bd43c72da89e17b5e1f44d3ad19fca1284047db7 -- docs/index.html

      - name: Commit generated briefing
        timeout-minutes: 1
        run: |
          git config user.name "senna-infoflow[bot]"
          git config user.email "senna-infoflow[bot]@users.noreply.github.com"

          git add briefings/ docs/ state/ data/ reports/ logs/ inbox/manual_notes.md

          if git diff --cached --quiet; then
            echo "No generated feed changes to commit."
          else
            if [ "${{ steps.hardened.outcome }}" = "success" ]; then
              git commit -m "chore: update Senna hardened briefing"
            else
              git commit -m "chore: update Senna emergency fallback briefing"
            fi
            git push
          fi
