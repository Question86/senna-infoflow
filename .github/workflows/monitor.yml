name: Senna Infoflow Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: senna-infoflow-monitor-emergency-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 9
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        timeout-minutes: 2
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write emergency minimal source config
        timeout-minutes: 1
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          sources = [
            {
              "id": "openai_news_rss",
              "name": "OpenAI News RSS",
              "type": "rss",
              "enabled": True,
              "max_items": 5,
              "url": "https://openai.com/news/rss.xml",
              "keywords": ["OpenAI", "ChatGPT", "AI agents", "automation", "safety", "privacy"]
            },
            {
              "id": "github_blog_atom",
              "name": "GitHub Blog Atom",
              "type": "rss",
              "enabled": True,
              "max_items": 5,
              "url": "https://github.blog/feed/",
              "keywords": ["GitHub", "GitHub Actions", "Copilot", "CodeQL", "Dependabot", "security", "automation", "AI"]
            },
            {
              "id": "github_changelog_atom",
              "name": "GitHub Changelog Atom",
              "type": "rss",
              "enabled": True,
              "max_items": 5,
              "url": "https://github.blog/changelog/feed/",
              "keywords": ["GitHub", "Copilot", "CodeQL", "Actions", "security", "automation", "AI"]
            },
            {
              "id": "hatena_hotentry_it",
              "name": "Hatena Bookmark Hotentry IT",
              "type": "rss",
              "enabled": True,
              "max_items": 6,
              "url": "https://b.hatena.ne.jp/hotentry/it.rss",
              "keywords": ["Japan", "Hatena", "technology", "developer", "AI", "security", "GitHub", "MCP", "Codex", "agent"]
            },
            {
              "id": "e27_asia_startups_feed",
              "name": "e27 Asia Startup and Tech Feed",
              "type": "rss",
              "enabled": True,
              "max_items": 5,
              "url": "https://e27.co/feed/",
              "keywords": ["Southeast Asia", "startup", "founder", "AI", "funding", "Singapore", "Indonesia", "Vietnam", "Thailand", "Philippines"]
            },
            {
              "id": "jpcert_english_alerts",
              "name": "JPCERT/CC English Alerts",
              "type": "rss",
              "enabled": True,
              "max_items": 5,
              "url": "https://www.jpcert.or.jp/english/rss/jpcert-en.rdf",
              "keywords": ["JPCERT", "Japan", "security", "CVE", "vulnerability", "incident", "advisory", "malware", "ransomware"]
            },
            {
              "id": "twcert_security_news",
              "name": "TWCERT/CC Security News RSS",
              "type": "rss",
              "enabled": True,
              "max_items": 5,
              "url": "https://www.twcert.org.tw/tw/rss-104-1.xml",
              "keywords": ["TWCERT", "Taiwan", "security", "CVE", "vulnerability", "incident", "phishing", "ransomware", "patch"]
            },
            {
              "id": "heise_security_atom",
              "name": "heise Security Alerts",
              "type": "rss",
              "enabled": True,
              "max_items": 5,
              "url": "https://www.heise.de/security/rss/alert-news-atom.xml",
              "keywords": ["security", "CVE", "vulnerability", "Datenschutz", "Open Source", "Supply Chain Security"]
            },
            {
              "id": "ap_top_news_rss",
              "name": "Associated Press Top News RSS",
              "type": "rss",
              "enabled": True,
              "max_items": 5,
              "url": "https://apnews.com/index.rss",
              "keywords": ["world", "politics", "economy", "conflict", "disaster", "technology"]
            },
            {
              "id": "manual_notes",
              "name": "Manual Notes Inbox",
              "type": "manual_note",
              "enabled": True,
              "path": "inbox/manual_notes.md",
              "keywords": ["AXI0M", "User Yps", "Product idea", "Content chance", "Datenschutz", "Automatisierung"]
            }
          ]

          cfg = {
            "meta": {
              "project": "senna-infoflow",
              "owner_alias": "User Yps",
              "company": "AXI0M",
              "website": "https://axi0m.de/blog.html",
              "scope_notice": "Emergency minimal fast-feed mode. Broad webpage_check and heavy overlays are bypassed until source-level timeouts/slow lane exist.",
              "emergency_mode": {
                "enabled": True,
                "reason": "Repeated hardened monitor timeouts after broad direct-source expansion.",
                "generated_utc": datetime.now(timezone.utc).isoformat(),
                "policy": "Keep structured RSS/manual core alive first; reintroduce sources by tier after feed writes again."
              }
            },
            "defaults": {
              "enabled": True,
              "max_items": 5
            },
            "sources": sources
          }
          Path("config").mkdir(exist_ok=True)
          Path("config/sources.yaml").write_text(json.dumps(cfg, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(f"Emergency source config written with {len(sources)} sources.")
          PY

      - name: Write active source manifest
        timeout-minutes: 1
        run: python scripts/write_source_manifest.py

      - name: Validate monitor configuration
        timeout-minutes: 1
        run: python scripts/validate_config.py

      - name: Run hardened monitor
        timeout-minutes: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USER_AGENT: senna-infoflow/1.0 (+https://github.com/${{ github.repository }})
          MAX_ITEMS_PER_SOURCE: 5
        run: python scripts/run_monitor_hardened.py

      - name: Filter stale findings
        timeout-minutes: 1
        run: python scripts/stale_filter_postprocess.py

      - name: Debias finding scores
        timeout-minutes: 1
        run: python scripts/debias_findings_postprocess.py

      - name: Run network hub postprocess
        timeout-minutes: 1
        run: python scripts/network_hub_postprocess.py

      - name: Run resonance ranking postprocess
        timeout-minutes: 1
        run: python scripts/resonance_rank_postprocess.py

      - name: Apply quality gate and coverage audit
        timeout-minutes: 1
        run: python scripts/quality_gate_postprocess.py

      - name: Write canonical report atoms and trend samples
        timeout-minutes: 1
        run: python scripts/write_canonical_reports.py

      - name: Harden state and outputs
        timeout-minutes: 1
        run: python scripts/harden_state_and_outputs.py

      - name: Commit generated briefings
        timeout-minutes: 1
        run: |
          git config user.name "senna-infoflow[bot]"
          git config user.email "senna-inflow[bot]@users.noreply.github.com"

          git add data/ briefings/ reports/ state/ config/sources.yaml

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update Senna briefing"
            git push
          fi
