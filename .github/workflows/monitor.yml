name: Senna Infoflow Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: senna-infoflow-emergency-feed-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Write emergency RSS briefing
        timeout-minutes: 3
        run: |
          python - <<'PY'
          import email.utils
          import json
          import re
          import time
          import urllib.request
          import xml.etree.ElementTree as ET
          from datetime import datetime, timezone
          from pathlib import Path
          from html import unescape

          USER_AGENT = "senna-infoflow-emergency/1.0"
          NOW = datetime.now(timezone.utc)
          TS = NOW.isoformat()

          sources = [
            ("openai_news_rss", "OpenAI News RSS", "https://openai.com/news/rss.xml"),
            ("github_blog_atom", "GitHub Blog", "https://github.blog/feed/"),
            ("github_changelog_atom", "GitHub Changelog", "https://github.blog/changelog/feed/"),
            ("hatena_hotentry_it", "Hatena Hotentry IT", "https://b.hatena.ne.jp/hotentry/it.rss"),
            ("e27_asia_startups_feed", "e27 Asia Startup and Tech", "https://e27.co/feed/"),
            ("jpcert_english_alerts", "JPCERT English Alerts", "https://www.jpcert.or.jp/english/rss/jpcert-en.rdf"),
            ("twcert_security_news", "TWCERT Security News", "https://www.twcert.org.tw/tw/rss-104-1.xml"),
            ("heise_security_atom", "heise Security Alerts", "https://www.heise.de/security/rss/alert-news-atom.xml"),
            ("ap_top_news_rss", "AP Top News", "https://apnews.com/index.rss"),
          ]

          def strip_html(text):
            text = unescape(text or "")
            text = re.sub(r"<[^>]+>", " ", text)
            text = re.sub(r"\s+", " ", text).strip()
            return text

          def child_text(el, names):
            for name in names:
              found = el.find(name)
              if found is not None and found.text:
                return found.text.strip()
            for child in list(el):
              local = child.tag.split("}", 1)[-1]
              if local in names and child.text:
                return child.text.strip()
            return ""

          def child_link(el):
            txt = child_text(el, ["link"])
            if txt:
              return txt.strip()
            for child in list(el):
              local = child.tag.split("}", 1)[-1]
              if local == "link":
                href = child.attrib.get("href")
                if href:
                  return href
            return ""

          def parse_date(s):
            if not s:
              return None
            try:
              return email.utils.parsedate_to_datetime(s).astimezone(timezone.utc).isoformat()
            except Exception:
              return None

          def fetch_source(source_id, name, url):
            req = urllib.request.Request(url, headers={"User-Agent": USER_AGENT})
            with urllib.request.urlopen(req, timeout=12) as resp:
              data = resp.read(800000)
            root = ET.fromstring(data)
            entries = []
            items = root.findall(".//item")
            if not items:
              items = [el for el in root.iter() if el.tag.split("}", 1)[-1] == "entry"]
            for item in items[:5]:
              title = strip_html(child_text(item, ["title"]))[:220]
              link = child_link(item)
              summary = strip_html(child_text(item, ["description", "summary", "content"]))[:360]
              published = parse_date(child_text(item, ["pubDate", "published", "updated", "date"]))
              if title:
                entries.append({
                  "source_id": source_id,
                  "source": name,
                  "title": title,
                  "url": link,
                  "summary": summary,
                  "published": published,
                  "score": 5,
                  "priority": "observe",
                })
            return entries

          findings = []
          errors = []
          for sid, name, url in sources:
            try:
              findings.extend(fetch_source(sid, name, url))
            except Exception as e:
              errors.append({"source_id": sid, "source": name, "url": url, "error": repr(e)})
            time.sleep(0.2)

          # simple dedupe by title/link
          seen = set()
          deduped = []
          for f in findings:
            key = (f.get("title", "").lower(), f.get("url", ""))
            if key in seen:
              continue
            seen.add(key)
            deduped.append(f)
          findings = deduped[:30]

          Path("briefings").mkdir(exist_ok=True)
          Path("state").mkdir(exist_ok=True)
          Path("reports").mkdir(exist_ok=True)
          Path("data").mkdir(exist_ok=True)

          latest = {
            "generated_at": TS,
            "mode": "emergency_minimal_rss_writer",
            "coverage_confidence": "limited",
            "status": "emergency",
            "summary": {
              "findings": len(findings),
              "source_errors": len(errors),
              "note": "Hardened monitor bypassed after repeated timeout. This is a minimal structured RSS feed to restore update cadence."
            },
            "findings": findings,
            "source_errors": errors,
          }
          Path("briefings/latest.json").write_text(json.dumps(latest, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          md = []
          md.append("# Senna Briefing\n")
          md.append(f"_Generiert: {TS}_\n")
          md.append("## Emergency Feed Mode\n")
          md.append("Der normale Hardened-Monitor wurde nach wiederholten Timeouts temporär umgangen. Dieser Lauf nutzt einen minimalen strukturierten RSS-Kern, damit der Nachrichtenfeed wieder atmet.\n")
          md.append(f"- Coverage confidence: `limited`\n- Findings: `{len(findings)}`\n- Source errors: `{len(errors)}`\n")
          md.append("## Kurzlage\n")
          if findings:
            md.append(f"{len(findings)} Treffer aus minimalem Kernfeed. Keine Score-Behauptung über Weltlage; nur Notversorgung bis zur sauberen Slow-Lane-Reparatur.\n")
          else:
            md.append("Keine verwertbaren Treffer aus dem Minimalfeed. Das ist ein technischer Warnzustand, keine Entwarnung.\n")
          md.append("## Nur beobachten\n")
          for f in findings:
            title = f["title"].replace("\n", " ")
            source = f["source"]
            url = f.get("url") or ""
            summary = f.get("summary") or ""
            pub = f.get("published") or "unknown"
            md.append(f"- **{title}** — {source} — Score 5, observation")
            if url:
              md.append(f"  - Quelle: {url}")
            md.append(f"  - Zeit: `{pub}`")
            if summary:
              md.append(f"  - Kurz: {summary}")
          md.append("\n## Source Errors\n")
          if errors:
            for e in errors:
              md.append(f"- `{e['source_id']}` — {e['error']}")
          else:
            md.append("- Keine.")
          md.append("\n---\nEND OF DOCUMENT\n")
          Path("briefings/latest.md").write_text("\n".join(md), encoding="utf-8")

          health_md = [
            "# Senna Pipeline Health",
            "",
            f"_Generated: {TS}_",
            "",
            "Status: `emergency`",
            "",
            "## Emergency Mode",
            "",
            "- Hardened monitor bypassed after repeated timeout.",
            "- Minimal RSS writer active.",
            f"- findings: `{len(findings)}`",
            f"- source errors: `{len(errors)}`",
            "",
            "---",
            "END OF DOCUMENT",
            "",
          ]
          Path("briefings/health.md").write_text("\n".join(health_md), encoding="utf-8")
          Path("briefings/health.json").write_text(json.dumps({
            "generated_at": TS,
            "status": "emergency",
            "mode": "emergency_minimal_rss_writer",
            "findings": len(findings),
            "source_errors": errors,
          }, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          print(f"Emergency briefing written with {len(findings)} findings and {len(errors)} source errors.")
          PY

      - name: Commit generated emergency briefing
        timeout-minutes: 1
        run: |
          git config user.name "senna-infoflow[bot]"
          git config user.email "senna-inflow[bot]@users.noreply.github.com"

          git add briefings/ state/ reports/ data/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update Senna emergency briefing"
            git push
          fi
