name: Senna Infoflow Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: senna-infoflow-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Merge source overlays
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import yaml

          base_path = Path("config/sources.yaml")
          overlay_paths = [
              Path("config/hot_sources.yaml"),
              Path("config/macro_sources.yaml"),
          ]

          base = yaml.safe_load(base_path.read_text(encoding="utf-8")) or {}
          base_sources = list(base.get("sources") or [])
          existing_ids = {str(source.get("id")) for source in base_sources if isinstance(source, dict)}

          merged_sources = []
          overlay_count = 0

          for overlay_path in overlay_paths:
              if not overlay_path.exists():
                  print(f"No {overlay_path} found; skipping.")
                  continue
              overlay = yaml.safe_load(overlay_path.read_text(encoding="utf-8")) or {}
              sources = list(overlay.get("sources") or [])
              accepted = [
                  source
                  for source in sources
                  if isinstance(source, dict) and str(source.get("id")) not in existing_ids
              ]
              for source in accepted:
                  existing_ids.add(str(source.get("id")))
              merged_sources.extend(accepted)
              overlay_count += len(accepted)
              print(f"Merged {len(accepted)} source(s) from {overlay_path}.")

          base["sources"] = merged_sources + base_sources
          base_path.write_text(json.dumps(base, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(f"Reset merged config with {overlay_count} overlay source(s).")
          PY

      - name: Validate monitor configuration
        run: python scripts/validate_config.py

      - name: Run hardened monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USER_AGENT: senna-inflow/1.0 (+https://github.com/${{ github.repository }})
          MAX_ITEMS_PER_SOURCE: 20
        run: python scripts/run_monitor_hardened.py

      - name: Run network hub postprocess
        run: python scripts/network_hub_postprocess.py

      - name: Run resonance ranking postprocess
        run: python scripts/resonance_rank_postprocess.py

      - name: Write canonical report atoms and trend samples
        run: python scripts/write_canonical_reports.py

      - name: Harden state and outputs
        run: python scripts/harden_state_and_outputs.py

      - name: Commit generated briefings
        run: |
          git config user.name "senna-inflow[bot]"
          git config user.email "senna-inflow[bot]@users.noreply.github.com"

          git add data/ briefings/ reports/ state/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update Senna briefing"
            git push
          fi
