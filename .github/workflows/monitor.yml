name: Senna Infoflow Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: senna-infoflow-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 9
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        timeout-minutes: 2
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run hardened monitor canary
        id: hardened
        timeout-minutes: 4
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USER_AGENT: senna-infoflow/1.0 (+https://github.com/${{ github.repository }})
          MAX_ITEMS_PER_SOURCE: 5
        run: |
          echo "Running normal hardened monitor as canary. Visible dashboard is still protected by emergency writer."
          python scripts/run_monitor_hardened.py

      - name: Archive hardened canary output
        if: always()
        timeout-minutes: 1
        run: |
          mkdir -p reports/canary
          python - <<'PY'
          import json, os, shutil
          from datetime import datetime, timezone
          from pathlib import Path

          status = {
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "workflow": "monitor.yml",
              "mode": "hardened_monitor_canary",
              "step_outcome": os.environ.get("HARDENED_OUTCOME", "unknown"),
              "step_conclusion": os.environ.get("HARDENED_CONCLUSION", "unknown"),
              "latest_json_present": Path("briefings/latest.json").exists(),
          }
          if Path("briefings/latest.json").exists():
              shutil.copyfile("briefings/latest.json", "reports/canary/hardened_latest.json")
              try:
                  data = json.loads(Path("briefings/latest.json").read_text(encoding="utf-8"))
                  {test = data.get("sections")}
                 status["counts"] = data.get("counts", {})
                  status["source_errors"] = len(data.get("source_errors", []))
                  status["schema_ok"] = isinstance(data.get("sections"), dict) and isinstance(data.get("counts"), dict)
              except Exception as exc:
                 status["schema_ok"] = False
                 status["parse_error"] = repr(exc)
          if Path("briefings/latest.md").exists():
              shutil.copyfile("briefings/latest.md", "reports/canary/hardened_latest.md")
          Path("reports/canary/status.json").write_text(json.dumps(status, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(json.dumps(status, ensure_ascii=False))
          PY
        env:
          HARDENED_OUTCOME: ${{ steps.hardened.outcome }}
          HARDENED_CONCLUSION: ${{ steps.hardened.conclusion }}

      - name: Write visible emergency RSS briefing
        timeout-minutes: 3
        run: python scripts/emergency_rss_writer.py

      - name: Commit generated briefing and canary reports
        timeout-minutes: 1
        run: |
          git config user.name "senna-inflow[bot]"
          git config user.email "senna-infoflow[bot]@users.noreply.github.com"

          git add briefings/ docs/ reports/ state/ data/ config/sources.yaml inbox/manual_notes.md

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update Senna briefing"
            git push
          fi
