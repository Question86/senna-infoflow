name: Senna Infoflow Monitor

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: senna-infoflow-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USER_AGENT: senna-infoflow/1.0 (+https://github.com/${{ github.repository }})
          MAX_ITEMS_PER_SOURCE: 20
        run: python scripts/monitor.py

      - name: Commit generated briefings
        run: |
          git config user.name "senna-infoflow[bot]"
          git config user.email "senna-infoflow[bot]@users.noreply.github.com"

          git add data/ briefings/ state/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update Senna briefing"
            git push
          fi
