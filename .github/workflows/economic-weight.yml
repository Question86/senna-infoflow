name: Economic Weight Shadow Layer

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Senna Infoflow Monitor"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: economic-weight-shadow
  cancel-in-progress: false

jobs:
  update:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check pyyaml

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_economic_weight_layer.py'

      - name: Update shadow ledger and reports
        run: python scripts/economic_weight_layer.py

      - name: Commit generated economic-weight artifacts
        run: |
          if git diff --quiet -- data/economic_events.jsonl briefings/economic_weight.json briefings/economic_weight.md; then
            echo "No economic-weight changes to commit."
            exit 0
          fi
          git config user.name "senna-infoflow-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/economic_events.jsonl briefings/economic_weight.json briefings/economic_weight.md
          git commit -m "data: update economic lifetime-weight shadow ledger"
          git push
