<!doctype html><meta charset=utf-8><title>Senna Action Console</title>
<style>body{background:#090d13;color:#eaf0f7;font-family:system-ui;margin:20px}section{border:1px solid #334057;border-radius:12px;padding:12px;margin:10px 0}.item{border:1px solid #334057;border-radius:10px;padding:8px;margin:8px 0;cursor:pointer}.score{color:#f4c76e;font-weight:700}textarea{width:100%;height:220px;background:#05070a;color:#eaf0f7}</style>
<h1>Senna Action Console</h1><p>Feed: <code id=feed></code></p><button onclick=load()>Aktualisieren</button> <button onclick=navigator.clipboard.writeText(research.value)>Rechercheauftrag kopieren</button>
<section><h2>Briefing</h2><div id=meta>Lade...</div><div id=list></div></section>
<section><h2>Handlungsmappe</h2><div id=detail>Event auswaehlen.</div><h3>Szenarien</h3><div id=scen></div><h3>Rechercheauftrag</h3><textarea id=research></textarea></section>
<section><h2>Run Atom</h2><pre id=atom></pre></section>
<script>
const RAW='https://raw.githubusercontent.com/Question86/senna-infoflow/main/';feed.textContent=RAW;let L,N,A='',items=[],sel=null;
function s(x){return String(x??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function sc(x){return Number(x?.relevance_score??x?.network_score??x?.max_score??0)}
async function js(p){let r=await fetch(RAW+p+'?cb='+Date.now());if(!r.ok)throw Error(p+' '+r.status);return r.json()}
async function tx(p){let r=await fetch(RAW+p+'?cb='+Date.now());return r.ok?r.text():''}
async function load(){try{L=await js('briefings/latest.json');N=await js('briefings/network.json');A=await tx('reports/latest_atom.md');let z=L.sections||{};items=[...(z.high||[]),...(z.medium||[]),...(z.observe||[])].map(x=>({...x,kind:'finding'}));(N.clusters||[]).forEach(c=>items.push({...c,kind:'cluster',relevance_score:c.network_score??c.max_score,source:(c.sources||[]).join(', '),url:(c.urls||[])[0],summary:'Cluster '+(c.finding_count??'?')+' Findings, Momentum '+(c.momentum_status||'unknown')}));items.sort((a,b)=>sc(b)-sc(a));if(!sel&&items[0])sel=items[0];render()}catch(e){meta.innerHTML='<b style=color:#f07278>Ladefehler:</b> '+s(e.message)+'<br><a target=_blank href='+RAW+'briefings/latest.json>latest.json testen</a>'}}
function render(){let c=L.counts||{};meta.innerHTML='generated: <b>'+s(L.generated_at)+'</b><br>new '+s(c.new_relevant_findings)+' | high '+s(c.high)+' | medium '+s(c.medium)+' | errors '+s(c.source_errors);list.innerHTML=items.length?items.map((x,i)=>'<div class=item onclick="sel=items['+i+'];render()"><b>'+s(x.title||x.key)+'</b><br><span>'+s(x.kind)+' | '+s(x.source||'source?')+'</span> <span class=score>Score '+sc(x)+'</span><p>'+s(x.summary||x.relevance_reason||'')+'</p></div>').join(''):'Keine Treffer';atom.textContent=A.slice(0,4000);show()}
function show(){if(!sel)return;detail.innerHTML='<h3>'+s(sel.title||sel.key)+'</h3><p><span class=score>Score '+sc(sel)+'</span> | '+s(sel.source||'')+'</p><p>'+s(sel.summary||'')+'</p>'+(sel.url?'<a target=_blank href="'+s(sel.url)+'">Quelle oeffnen</a>':'');scen.innerHTML=['leicht','mittel','stark'].map((n,i)=>'<div class=item><b>'+n+' Verlauf</b><br>Chance: '+['Info sichern','Positionierung vorbereiten','Expertise zeigen'][i]+'<br>Risiko: '+['Falschalarm','fehlende Bestaetigung','zu spaet'][i]+'<br>Aktion: '+['beobachten','2-3 Quellen pruefen','Lagebild + Entwurf'][i]+'</div>').join('');research.value='RECHERCHEAUFTRAG\n\nEvent:\n'+(sel.title||sel.key||'')+'\n\nQuelle:\n'+(sel.source||'')+'\n\nURL:\n'+(sel.url||'')+'\n\nScore: '+sc(sel)+'\n\nAnalysiere gesichert/wahrscheinlich, Chancen/Risiken fuer Yps/AXI0M, Szenarien leicht/mittel/stark, naechste Handlung und was nicht getan werden sollte.'}
load();setInterval(load,60000);
</script>
